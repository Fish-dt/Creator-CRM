name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/creator-crm

jobs:
  release:
    name: Build, tag & deploy production
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push all images with version tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for svc in deal-service deliverable-service campaign-service invoice-service notification-service analytics-service api-gateway; do
            ./gradlew :services:$svc:jib \
              -Djib.to.image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:$TAG \
              -Djib.to.tags=latest
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Deploy to production
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          TAG=${GITHUB_REF#refs/tags/}
          for svc in deal-service deliverable-service campaign-service invoice-service notification-service analytics-service api-gateway; do
            helm upgrade --install $svc ./infra/k8s/helm/$svc \
              -f ./infra/k8s/helm/$svc/values-prod.yaml \
              --set image.tag=$TAG \
              --namespace creator-crm-prod \
              --create-namespace \
              --atomic \
              --timeout 5m
          done
