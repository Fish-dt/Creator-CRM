name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/creator-crm

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ktlint + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  # ── Backend unit tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       creator_crm_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run all tests
        run: ./gradlew test --continue
        env:
          DB_URL:      jdbc:postgresql://localhost:5432/creator_crm_test
          DB_USER:     postgres
          DB_PASS:     postgres
          KAFKA_BROKERS: localhost:9092   # Testcontainers spins its own

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  # ── Frontend tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm test -- --ci --passWithNoTests
        working-directory: frontend

      - name: Build Next.js
        working-directory: frontend
        run: npm run build

  # ── Security scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Build & push Docker images (main branch only) ─────────────────────────────
  docker-build:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - deal-service
          - deliverable-service
          - campaign-service
          - invoice-service
          - notification-service
          - analytics-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push via Jib
        run: |
          ./gradlew :services:${{ matrix.service }}:jib \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -Djib.to.tags=latest

  # ── Deploy to staging (main only, after Docker push) ─────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags in Helm values
        run: |
          for svc in deal-service deliverable-service campaign-service invoice-service notification-service analytics-service api-gateway; do
            sed -i "s|tag:.*|tag: ${{ github.sha }}|" infra/k8s/helm/$svc/values-staging.yaml
          done

      - name: Helm upgrade all services
        run: |
          for svc in deal-service deliverable-service campaign-service invoice-service notification-service analytics-service api-gateway; do
            helm upgrade --install $svc ./infra/k8s/helm/$svc \
              -f ./infra/k8s/helm/$svc/values-staging.yaml \
              --namespace creator-crm \
              --create-namespace \
              --atomic \
              --timeout 3m
          done

      - name: Smoke test
        run: |
          sleep 15
          curl -f https://staging.creatorcrm.io/actuator/health || exit 1
