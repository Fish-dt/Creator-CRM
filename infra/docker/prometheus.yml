global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /actuator/prometheus

  - job_name: deal-service
    static_configs:
      - targets: ["deal-service:8081"]
    metrics_path: /actuator/prometheus

  - job_name: deliverable-service
    static_configs:
      - targets: ["deliverable-service:8082"]
    metrics_path: /actuator/prometheus

  - job_name: campaign-service
    static_configs:
      - targets: ["campaign-service:8083"]
    metrics_path: /actuator/prometheus

  - job_name: invoice-service
    static_configs:
      - targets: ["invoice-service:8084"]
    metrics_path: /actuator/prometheus

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8085"]
    metrics_path: /actuator/prometheus

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:8086"]
    metrics_path: /actuator/prometheus

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
