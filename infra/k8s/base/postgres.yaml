---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: creator-crm
data:
  init.sql: |
    CREATE DATABASE creator_crm;

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: creator-crm
type: Opaque
stringData:
  POSTGRES_USER:     postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB:       creator_crm

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: creator-crm
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: creator-crm
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless — StatefulSet DNS: postgres.creator-crm.svc.cluster.local
